<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Página no encontrada · Liss García</title>
<meta name="robots" content="noindex,follow">
<meta name="theme-color" content="#0A0A0C">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0C;--text:#F5F1E8;--muted:rgba(245,241,232,.66);--gold:#D9B45B;--gold-2:#E7CB85;--gold-deep:#A8842E;--gold-ink:#1A1408;
--sans:-apple-system,"SF Pro Display",system-ui,"Segoe UI",Roboto,sans-serif;--serif:"Cormorant Garamond",Georgia,serif}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased;overflow:hidden}
.halo{position:fixed;top:-160px;left:50%;transform:translateX(-50%);width:560px;height:560px;border-radius:50%;filter:blur(90px);background:radial-gradient(circle,rgba(217,180,91,.16),transparent 70%);pointer-events:none}
.wrap{position:relative;z-index:1;max-width:520px}
.code{font-family:var(--serif);font-size:clamp(90px,22vw,150px);font-weight:600;line-height:.9;background:linear-gradient(180deg,var(--gold-2),var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent}
.eyebrow{font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:18px 0 6px}
h1{font-family:var(--serif);font-size:clamp(26px,5vw,36px);font-weight:500;margin-bottom:14px}
p{color:var(--muted);font-size:16.5px;line-height:1.6;margin-bottom:30px}
.btn{display:inline-flex;align-items:center;gap:9px;padding:15px 28px;border-radius:14px;font-weight:600;font-size:15.5px;background:linear-gradient(180deg,var(--gold-2),var(--gold));color:var(--gold-ink);text-decoration:none;box-shadow:0 10px 30px -8px rgba(217,180,91,.55);transition:transform .15s,box-shadow .25s}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 44px -8px rgba(217,180,91,.8)}
</style>
</head>
<body>
<div class="halo"></div>
<div class="wrap">
  <div class="code">404</div>
  <div class="eyebrow">Liss García</div>
  <h1>Esta página no existe… todavía.</h1>
  <p>Puede que el enlace haya cambiado o que escribiste mal la dirección. Volvamos a un lugar seguro.</p>
  <a class="btn" href="/">← Volver al inicio</a>
</div>
</body>
</html>
